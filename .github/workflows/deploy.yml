name: Deploy Next.js to Cloud Run
on:
  push:
    branches: [ main ] # This triggers the CI/CD on every push to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    # This matches the "Environment" name in your GitHub settings
    environment: GCP_PROJECT_ID 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Build and Push Container
        # Compiling securely on the GitHub runner explicitly to bake inside the Public variables 
        run: |-
          gcloud auth configure-docker -q
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/nextjs-app .
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/nextjs-app

      - name: Deploy to Cloud Run
        run: |-
          gcloud run deploy nextjs-app \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/nextjs-app \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --update-env-vars HOSTNAME=0.0.0.0 \
            --update-env-vars NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --update-env-vars NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --update-env-vars SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}